<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- DNS prefetch + preconnect to critical CDNs (speeds up first connection) -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- preconnect MUST come before the font stylesheet request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!--
      Load Poppins as a NON-render-blocking stylesheet.
      The media="print" trick: browser downloads the sheet without blocking render,
      then onload switches media to "all" so it applies normally.
      The <noscript> fallback covers JS-disabled environments.
    -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Preload LCP image so browser fetches it before JS bundle executes -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dpsq08nun/image/upload/f_auto,q_auto,w_300/v1777359495/IMG-20260407-WA0000_eyvt70.jpg"
    />

    <link rel="icon" type="image/svg+xml" href="https://res.cloudinary.com/dpsq08nun/image/upload/f_auto,q_auto,w_64/v1777359495/IMG-20260407-WA0000_eyvt70.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DERMASIS REMEDIES Pvt. Ltd / Product Vizulate</title>

    <!-- SEO meta description -->
    <meta name="description" content="A comprehensive guide to pioneering dermatological wellness for healthy, resilient skin. Explore Dermasis Remedies pharmaceutical products." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
